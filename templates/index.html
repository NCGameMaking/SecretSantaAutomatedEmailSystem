<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Santa Email Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Securing sleigh routes and sending emails...</div>
    </div>
    <main class="page">
        <section class="hero">
            <h1>Secret Santa Email Generator</h1>
            <p>Enter your participant list, set the budget and party date, then send private gift assignments in one click.</p>
        </section>

        <section class="card">
            <form action="/start-santa" method="POST" onsubmit="showLoading()">
                <div class="section">
                    <fieldset>
                        <legend>Event details</legend>
                        <div class="grid-2">
                            <label>
                                <span>Gift budget: ($)</span>
                                <input type="number" name="budget" value="20" min="1" required>
                            </label>
                            <label>
                                <span>Party date</span>
                                <input type="date" name="party_date" required>
                            </label>
                        </div>
                    </fieldset>

                    <div>
                        <p class="hint">Add each participant's name and email address. You need at least two people to start Secret Santa.</p>
                        <div id="participant-list">
                            <div class="input-group">
                                <input type="text" name="names[]" placeholder="Name" required>
                                <input type="email" name="emails[]" placeholder="Email" required>
                                <button type="button" class="remove-btn" onclick="removeRow(this)" aria-label="Remove participant"></button>
                            </div>
                            <div class="input-group">
                                <input type="text" name="names[]" placeholder="Name" required>
                                <input type="email" name="emails[]" placeholder="Email" required>
                                <button type="button" class="remove-btn" onclick="removeRow(this)" aria-label="Remove participant"></button>
                            </div>
                            <div class="input-group">
                                <input type="text" name="names[]" placeholder="Name" required>
                                <input type="email" name="emails[]" placeholder="Email" required>
                                <button type="button" class="remove-btn" onclick="removeRow(this)" aria-label="Remove participant"></button>
                            </div>
                        </div>
                    </div>

                    <div class="button-row">
                        <button type="button" class="add-btn" onclick="addRow()">+ Add Person</button>
                        <button type="submit" class="submit-btn">Send Secret Santa Emails</button>
                    </div>
                </div>
            </form>
        </section>
    </main>
    
    <script>
        function addRow(){
            const list = document.getElementById('participant-list');
            const newRow = document.createElement('div');
            newRow.className ='input-group';
            newRow.innerHTML = `
                <input type="text" name="names[]" placeholder="Name" required>
                <input type="email" name="emails[]" placeholder="Email" required>
                <button type="button" class="remove-btn" onclick="removeRow(this)" aria-label="Remove participant"></button>
            `;
            list.appendChild(newRow);
        }

        function removeRow(button){
            const list = document.getElementById('participant-list');

            if (list.children.length>2) {
                button.parentElement.remove();
            } else {
                alert("You need at least 2 participants for a Secret Santa!");
            }
        }

        function showLoading() {
            document.getElementById('loading-overlay').style.display = 'flex'
        }
    </script>
</body>
</html>
